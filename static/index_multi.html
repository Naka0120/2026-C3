<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Pipe Organ Simulator (Multi-Chord)</title>
    <!-- CSS -->
    <link rel="stylesheet" href="/static/css/style.css">

    <!-- Three.js & OrbitControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>

<body>
    <div class="dashboard">
        <div class="panel header-panel">
            <h1>Pipe Organ Digital Twin (Multi-Chord)</h1>
            <div id="step-val" style="font-family: monospace; color: #64748b;">Step: 0</div>
        </div>

        <div class="panel view-panel">
            <div id="resonance-badge" class="status-badge">風切り音のみ (非発音)</div>
            <div id="canvas-container" title="マウスドラッグで視点を自由に回転・移動できます"></div>
        </div>

        <div class="panel controls">
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button id="audio-btn" style="flex: 1;">PLAY AUDIO</button>
            </div>

            <div class="control-group">
                <label><span>風速 (m/s)</span> <span id="wind-ms-display">15</span></label>
                <input type="range" id="wind-slider" min="0" max="30" step="1" value="15">
            </div>

            <div class="metrics">
                <div class="metric-row">局所風速 <span><span class="metric-val" id="local-v-val">0.0</span> <span
                            style="font-size: 0.8rem; color:#888" id="local-v-ms-val">(0.0 m/s)</span></span></div>
                <div class="metric-row">気柱共鳴周波数 <span style="color:var(--alert);"><span class="metric-val"
                            id="freq-val">0.0</span> Hz</span></div>
            </div>
            
            <p style="font-size: 0.8rem; color:#888; margin-top: 20px;">
                前列：Cメジャー (微風用)<br>
                後列：Aマイナー (中風速用)
            </p>
        </div>
    </div>

    <!-- JS Modules -->
    <script src="/static/js/viewer3d_multi.js"></script>
    <script src="/static/js/main_multi.js"></script>
</body>

</html>
