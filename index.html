<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Aeolian Harp Simulator</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --text: #e2e8f0;
            --accent: #38bdf8;
            --alert: #fbbf24;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .dashboard {
            width: 100%;
            max-width: 1000px;
            display: grid;
            gap: 20px;
            grid-template-columns: 1fr 300px;
        }

        .panel {
            background: var(--panel);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .header-panel {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--accent);
            letter-spacing: 1px;
        }

        .view-panel {
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 300px;
        }

        img#sim-frame {
            width: 100%;
            border-radius: 8px;
            filter: contrast(1.2);
        }

        .status-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.6);
            color: #888;
            transition: 0.3s;
        }

        .status-badge.active {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 15px var(--accent);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .control-group label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 5px;
            color: #94a3b8;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
        }

        .metrics {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #334155;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
        }

        .metric-val {
            font-family: monospace;
            color: var(--accent);
            font-size: 1.2rem;
        }

        button {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button.active {
            background: var(--accent);
            color: var(--bg);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }
    </style>
</head>

<body>
    <div class="dashboard">
        <div class="panel header-panel">
            <h1>Aeolian Harp Digital Twin</h1>
            <div id="step-val" style="font-family: monospace; color: #64748b;">Step: 0</div>
        </div>

        <div class="panel view-panel">
            <div id="resonance-badge" class="status-badge">風切り音のみ (非共振)</div>
            <img id="sim-frame" src="" alt="Simulation loading...">
        </div>

        <div class="panel controls">
            <button id="audio-btn">PLAY AUDIO</button>

            <div class="control-group">
                <label><span>風速 (V)</span> <span id="wind-display">0.05</span></label>
                <input type="range" id="wind-slider" min="0.01" max="0.20" step="0.01" value="0.05">
            </div>
            <div class="control-group">
                <label><span>弦の太さ (D)</span> <span id="size-display">5</span></label>
                <input type="range" id="size-slider" min="1" max="15" step="1" value="5">
            </div>
            <div class="control-group">
                <label><span>基本周波数 (f1)</span> <span id="freq-display">110 Hz</span></label>
                <input type="range" id="basefreq-slider" min="55" max="440" step="1" value="110">
            </div>

            <div class="metrics">
                <div class="metric-row">渦の周波数 <span><span class="metric-val" id="raw-fs-val">0.0</span> Hz</span></div>
                <div class="metric-row">共振周波数 <span style="color:var(--alert);"><span class="metric-val"
                            id="freq-val">0.0</span> Hz</span></div>
                <div class="metric-row">倍音次数 <span>第 <span class="metric-val" id="harmonic-val">-</span> 倍音</span></div>
            </div>
        </div>
    </div>

    <script>
        const ws = new WebSocket("ws://localhost:8000/ws");

        // UI Elements
        const updateText = (id, val) => document.getElementById(id).innerText = val;

        ['wind', 'size', 'basefreq'].forEach(id => {
            document.getElementById(`${id}-slider`).addEventListener('input', (e) => {
                let val = e.target.value;
                updateText(`${id}-display`, id === 'basefreq' ? `${val} Hz` : val);

                let payload = { type: 'update' };
                if (id === 'wind') payload.u_in = parseFloat(val);
                if (id === 'size') payload.radius = parseInt(val);
                if (id === 'basefreq') payload.base_freq = parseFloat(val);
                ws.send(JSON.stringify(payload));
            });
        });

        // Audio Engine (Harp-like sound)
        let audioCtx, oscillator, gainNode;
        let isPlaying = false;
        const audioBtn = document.getElementById('audio-btn');

        audioBtn.addEventListener('click', () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                oscillator = audioCtx.createOscillator();
                gainNode = audioCtx.createGain();

                oscillator.type = 'triangle'; // ハープや弦楽器に近い波形
                gainNode.gain.value = 0; // 初期は無音

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
            }
            isPlaying = !isPlaying;
            audioBtn.innerText = isPlaying ? "STOP AUDIO" : "PLAY AUDIO";
            audioBtn.className = isPlaying ? "active" : "";
        });

        // Data processing
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            document.getElementById('sim-frame').src = "data:image/jpeg;base64," + data.image;
            updateText('step-val', `Step: ${data.step}`);

            // LBMの数値を仮に現実スケールに拡大
            const scale = 10000;
            const fsDisplay = (data.raw_fs * scale).toFixed(1);
            updateText('raw-fs-val', fsDisplay);

            const badge = document.getElementById('resonance-badge');

            if (data.harmonic > 0) {
                // 共振している場合
                updateText('freq-val', data.freq.toFixed(1));
                updateText('harmonic-val', data.harmonic);
                badge.innerText = `第${data.harmonic}倍音で共振中！`;
                badge.className = "status-badge active";

                if (isPlaying && oscillator) {
                    oscillator.frequency.setTargetAtTime(data.freq, audioCtx.currentTime, 0.1);
                    // 共振時は音量を上げる
                    gainNode.gain.setTargetAtTime(0.4, audioCtx.currentTime, 0.1);
                }
            } else {
                // 共振していない場合
                updateText('freq-val', "---");
                updateText('harmonic-val', "-");
                badge.innerText = "風切り音のみ (非共振)";
                badge.className = "status-badge";

                if (isPlaying && oscillator) {
                    // 非共振時は音をフェードアウト
                    gainNode.gain.setTargetAtTime(0.0, audioCtx.currentTime, 0.5);
                }
            }
        };
    </script>
</body>

</html>
